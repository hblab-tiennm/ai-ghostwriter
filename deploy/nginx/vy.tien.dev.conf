# vy.tien.dev — AI Ghostwriter
# Nginx reverse proxy for Next.js + MCP server
#
# Usage:
#   sudo cp deploy/nginx/vy.tien.dev.conf /etc/nginx/sites-available/vy.tien.dev
#   sudo ln -s /etc/nginx/sites-available/vy.tien.dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name vy.tien.dev;

    # Cloudflare will handle SSL termination
    # If using Cloudflare Proxy mode, this HTTP-only config is fine.
    # Cloudflare → Nginx via HTTP, browser ↔ Cloudflare via HTTPS.

    # Security headers (Cloudflare adds some, but belt-and-suspenders)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── MCP Server: SSE endpoint ────────────────────────────────
    location /mcp/sse {
        proxy_pass http://127.0.0.1:3001/sse;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specific — disable buffering
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;  # keep SSE alive for 24h
    }

    # ── MCP Server: Message relay ───────────────────────────────
    location /mcp/message {
        proxy_pass http://127.0.0.1:3001/message;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── MCP Server: REST tool endpoints ─────────────────────────
    location /mcp/tools/ {
        proxy_pass http://127.0.0.1:3001/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for AI model calls that might take a while
        proxy_read_timeout 120s;
    }

    # ── MCP Server: Health check ────────────────────────────────
    location /mcp/health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
    }

    # ── Next.js: Static assets (immutable cache) ────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js: Catch-all ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js API routes can be slow (AI generation)
        proxy_read_timeout 300s;
    }
}
